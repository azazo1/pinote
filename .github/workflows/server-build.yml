name: Sync server build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "server/**"
      - "compose.yml"
      - "compose.local.yml"
      - ".dockerignore"
      - ".github/workflows/server-build.yml"
  pull_request:
    paths:
      - "server/**"
      - "compose.yml"
      - "compose.local.yml"
      - ".dockerignore"
      - ".github/workflows/server-build.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Run Clippy
        run: cargo clippy --manifest-path server/Cargo.toml --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path server/Cargo.toml

  container:
    name: Multi-platform container
    needs: rust
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pinote-sync-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and optionally publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
